services:
  bridge:
    build: .
    command:
      - bridge
      - --db=${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}/messages.db
      - --session-db=${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}/whatsapp.db
      - --media-dir=${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}/media
      - --access-level=${WABRIDGE_ACCESS_LEVEL:-3}
      - --features=${WABRIDGE_FEATURES:-}
    restart: unless-stopped
    user: "${WABRIDGE_UID:-1000}:${WABRIDGE_GID:-1000}"
    volumes:
      - ${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}:${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}
    networks:
      - wabridge-net

  mcp:
    build: .
    command:
      - mcp
      - --db=${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}/messages.db
      - --bridge-url=http://bridge:8080
      - --access-level=${WABRIDGE_ACCESS_LEVEL:-3}
      - --features=${WABRIDGE_FEATURES:-}
    stdin_open: true
    user: "${WABRIDGE_UID:-1000}:${WABRIDGE_GID:-1000}"
    volumes:
      - ${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}:${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}
    networks:
      - wabridge-net
    depends_on:
      - bridge
    profiles:
      - mcp

  standalone:
    build: .
    command:
      - standalone
      - --db=${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}/messages.db
      - --session-db=${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}/whatsapp.db
      - --media-dir=${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}/media
      - --access-level=${WABRIDGE_ACCESS_LEVEL:-3}
      - --features=${WABRIDGE_FEATURES:-}
    stdin_open: true
    user: "${WABRIDGE_UID:-1000}:${WABRIDGE_GID:-1000}"
    volumes:
      - ${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}:${WABRIDGE_DATA_DIR:?Set WABRIDGE_DATA_DIR in .env}
    profiles:
      - standalone

networks:
  wabridge-net:
